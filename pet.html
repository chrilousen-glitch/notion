<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chodracotchi Widget</title>
    <style>
        :root {
            --bg-color: transparent;
            --panel-bg: #fff0f5;
            --text-color: #2b2b2b;
            --border-color: #31a2b8;
            --pink-primary: #ff7ebb;
            --blue-wings: #2da1db;
            --yellow-belly: #ffd32a;
        }

        /* Support Notion Dark Mode automatically */
        @media (prefers-color-scheme: dark) {
            :root {
                --panel-bg: #1f1f1f;
                --text-color: #f5f5f5;
                --border-color: #247b8c;
            }
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .device-container {
            width: 320px;
            background: var(--panel-bg);
            border: 4px solid var(--border-color);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 5px;
        }

        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }

        canvas {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid #ccc;
            border-radius: 8px;
            image-rendering: pixelated;
        }

        @media (prefers-color-scheme: dark) {
            canvas { background: rgba(0, 0, 0, 0.3); border-color: #444; }
        }

        .stats-panel {
            width: 100%;
            margin-top: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .bar-container {
            width: 160px;
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #aaa;
        }

        .bar {
            height: 100%;
            width: 100%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        button {
            background: var(--pink-primary);
            color: white;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 8px;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
        }

        button.sleep-btn { background: #4a69bd; }
        button.play-btn { background: #f6b93b; }
        button.clean-btn { background: #079992; }

        .status-text {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 8px;
            color: #888;
            height: 15px;
        }
    </style>
</head>
<body>

<div class="device-container">
    <div class="header">CHODRACOTCHI</div>
    
    <div class="screen">
        <!-- Render character and background environments via Canvas -->
        <canvas id="petCanvas" width="200" height="130"></canvas>
        
        <div class="stats-panel">
            <div class="stat-row">
                <span>🍖 HUNGER</span>
                <div class="bar-container"><div id="hungerBar" class="bar"></div></div>
            </div>
            <div class="stat-row">
                <span>⭐ HAPPY</span>
                <div class="bar-container"><div id="happyBar" class="bar"></div></div>
            </div>
            <div class="stat-row">
                <span>⚡ ENERGY</span>
                <div class="bar-container"><div id="energyBar" class="bar"></div></div>
            </div>
        </div>
    </div>

    <div class="button-grid">
        <button onclick="feedPet()">🍖 FEED</button>
        <button class="play-btn" onclick="playPet()">⭐ PLAY</button>
        <button class="sleep-btn" onclick="toggleSleep()"><span id="sleepIcon">💤</span> <span id="sleepText">SLEEP</span></button>
        <button class="clean-btn" onclick="cleanPet()">🧼 BATH</button>
    </div>

    <div id="statusAlert" class="status-text"></div>
</div>

<script>
    const canvas = document.getElementById('petCanvas');
    const ctx = canvas.getContext('2d');

    // Setup LocalStorage Stats default structures
    let pet = JSON.parse(localStorage.getItem('chodracotchi_pet')) || {
        hunger: 80,
        happy: 70,
        energy: 60,
        isSleeping: false,
        lastUpdated: Date.now()
    };

    let animationFrame = 0;
    let actionState = 'idle'; // 'idle', 'eating', 'playing', 'showering'
    let actionTimer = 0;

    function saveStats() {
        pet.lastUpdated = Date.now();
        localStorage.setItem('chodracotchi_pet', JSON.stringify(pet));
    }

    // Process survival stat decay when away or working
    function processOfflineDecay() {
        const now = Date.now();
        const elapsedSeconds = Math.floor((now - pet.lastUpdated) / 1000);
        
        if (elapsedSeconds > 0) {
            if (pet.isSleeping) {
                pet.energy = Math.min(100, pet.energy + (elapsedSeconds * 0.02));
                pet.hunger = Math.max(0, pet.hunger - (elapsedSeconds * 0.003));
            } else {
                pet.hunger = Math.max(0, pet.hunger - (elapsedSeconds * 0.005));
                pet.happy = Math.max(0, pet.happy - (elapsedSeconds * 0.004));
                pet.energy = Math.max(0, pet.energy - (elapsedSeconds * 0.003));
            }
        }
    }

    // Care Actions Functions
    function feedPet() {
        if (pet.isSleeping) return alertMsg("Shhh... Chodracotchi is sleeping!");
        pet.hunger = Math.min(100, pet.hunger + 20);
        triggerAction('eating');
        alertMsg("Yum! Chodracotchi loved the snack!");
    }

    function playPet() {
        if (pet.isSleeping) return alertMsg("Shhh... Chodracotchi is sleeping!");
        if (pet.energy < 15) return alertMsg("Too tired to play right now!");
        pet.happy = Math.min(100, pet.happy + 15);
        pet.energy = Math.max(0, pet.energy - 10);
        triggerAction('playing');
        alertMsg("Yay! Playing games!");
    }

    function toggleSleep() {
        pet.isSleeping = !pet.isSleeping;
        document.getElementById('sleepText').innerText = pet.isSleeping ? "WAKE" : "SLEEP";
        document.getElementById('sleepIcon').innerText = pet.isSleeping ? "☀️" : "💤";
        alertMsg(pet.isSleeping ? "Chodracotchi fell asleep..." : "Good morning!");
        saveStats();
    }

    function cleanPet() {
        if (pet.isSleeping) return alertMsg("Shhh... Chodracotchi is sleeping!");
        pet.happy = Math.min(100, pet.happy + 10);
        triggerAction('showering');
        alertMsg("Squeaky clean!");
    }

    function triggerAction(action) {
        actionState = action;
        actionTimer = 45; // length of temporary special action frames
    }

    function alertMsg(msg) {
        const el = document.getElementById('statusAlert');
        el.innerText = msg;
        setTimeout(() => { if(el.innerText === msg) el.innerText = ""; }, 3000);
    }

    // Dynamic UI Progress Bars Color Gradients Updates
    function updateBars() {
        const bars = [
            { id: 'hungerBar', val: pet.hunger },
            { id: 'happyBar', val: pet.happy },
            { id: 'energyBar', val: pet.energy }
        ];
        
        bars.forEach(b => {
            const el = document.getElementById(b.id);
            el.style.width = b.val + '%';
            if (b.val > 50) el.style.backgroundColor = '#4caf50';
            else if (b.val > 20) el.style.backgroundColor = '#ff9800';
            else el.style.backgroundColor = '#f44336';
        });
    }

    // Draw the custom dragon inspired by your image onto Canvas
    function drawChodracotchi(x, y, frame) {
        let bob = Math.sin(frame * 0.15) * 2; // subtle hovering/breathing bounce
        if (pet.isSleeping) bob = 0;

        ctx.save();
        ctx.translate(x, y + bob);

        // 1. Wings (Blue)
        ctx.fillStyle = '#2da1db';
        if (pet.isSleeping) {
            // Folded wings
            ctx.fillRect(-22, -10, 6, 12);
            ctx.fillRect(16, -10, 6, 12);
        } else {
            // Wing flaps base animation
            let wingFlap = Math.floor(frame / 6) % 2 === 0 ? 0 : -3;
            ctx.fillRect(-26, -14 + wingFlap, 10, 8);
            ctx.fillRect(16, -14 + wingFlap, 10, 8);
        }

        // 2. Tail (Pink)
        ctx.fillStyle = '#ff7ebb';
        ctx.fillRect(10, 4, 12, 6);
        ctx.fillRect(18, 0, 6, 6);

        // 3. Body base & Little Arms/Feet
        ctx.fillRect(-14, -12, 28, 24); // Main trunk
        ctx.fillRect(-12, 12, 6, 4);   // Left foot
        ctx.fillRect(6, 12, 6, 4);    // Right foot
        
        if (actionState !== 'playing') {
            ctx.fillRect(-18, -4, 5, 5);  // Left arm
            ctx.fillRect(13, -4, 5, 5);  // Right arm
        } else {
            ctx.fillRect(-18, -10, 5, 5); // Arms up celebrating!
            ctx.fillRect(13, -10, 5, 5);
        }

        // 4. Yellow Belly Accent
        ctx.fillStyle = '#ffd32a';
        ctx.fillRect(-8, -4, 16, 14);

        // 5. Head Shapes & Spiky Cheeks
        ctx.fillStyle = '#ff7ebb';
        ctx.fillRect(-18, -34, 36, 24);
        ctx.fillRect(-22, -26, 4, 12); // Cheek spikes
        ctx.fillRect(18, -26, 4, 12);

        // 6. White Horns
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-12, -42, 6, 10);
        ctx.fillRect(6, -42, 6, 10);

        // 7. Face Expression Rules
        ctx.fillStyle = '#2da1db'; // Cute dark blue eyes
        if (pet.isSleeping) {
            // Sleeping closed lines: -- --
            ctx.fillRect(-10, -22, 6, 2);
            ctx.fillRect(4, -22, 6, 2);
        } else if (pet.hunger < 20 || pet.happy < 20) {
            // Distressed/Sad angled eyes: > <
            ctx.font = 'bold 12px monospace';
            ctx.fillText('>', -11, -18);
            ctx.fillText('<', 4, -18);
        } else {
            // Standard determined sharp eyes
            ctx.fillRect(-10, -24, 5, 5);
            ctx.fillRect(5, -24, 5, 5);
        }

        // Cute Mouth "w"
        ctx.strokeStyle = '#2da1db';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(-2, -15, 2, 0, Math.PI);
        ctx.arc(2, -15, 2, 0, Math.PI);
        ctx.stroke();

        // 8. Action Overlays (E.g. Hearts, Food crumbs, Sleep bubbles)
        if (pet.isSleeping && frame % 30 < 15) {
            ctx.fillStyle = '#4a69bd';
            ctx.font = '10px monospace';
            ctx.fillText('Zzz', 18, -40);
        }
        if (actionState === 'eating') {
            ctx.fillStyle = '#b53471';
            ctx.fillRect(-22, -14, 4, 4); // Little floating snack bites
        }
        if (actionState === 'showering') {
            ctx.fillStyle = '#25ccf7';
            ctx.fillRect(-5 + (frame%5), -48 + (frame%15), 2, 4);
            ctx.fillRect(5 - (frame%7), -45 + (frame%12), 2, 4);
        }

        ctx.restore();
    }

    // Core Game Loop Execution
    function gameLoop() {
        animationFrame++;

        // Handle active status actions expiration cycles
        if (actionState !== 'idle') {
            actionTimer--;
            if (actionTimer <= 0) actionState = 'idle';
        }

        // Live passive metric reduction updates over time
        if (animationFrame % 60 === 0) {
            if (pet.isSleeping) {
                pet.energy = Math.min(100, pet.energy + 0.4);
                pet.hunger = Math.max(0, pet.hunger - 0.05);
            } else {
                pet.hunger = Math.max(0, pet.hunger - 0.1);
                pet.happy = Math.max(0, pet.happy - 0.08);
                pet.energy = Math.max(0, pet.energy - 0.06);
            }
            updateBars();
            saveStats();
        }

        // Render Frame Step
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Ambient Background Sky Details
        ctx.fillStyle = pet.isSleeping ? '#1a1a2e' : '#e1f5fe';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Floor ground layer
        ctx.fillStyle = pet.isSleeping ? '#16a085' : '#2ecc71';
        ctx.fillRect(0, 105, canvas.width, 25);

        // Draw Chodracotchi centered inside the environment box
        drawChodracotchi(canvas.width / 2, 75, animationFrame);

        requestAnimationFrame(gameLoop);
    }

    // Startup Execution Sequence
    processOfflineDecay();
    updateBars();
    if (pet.isSleeping) {
        document.getElementById('sleepText').innerText = "WAKE";
        document.getElementById('sleepIcon').innerText = "☀️";
    }
    gameLoop();
</script>

</body>
</html>

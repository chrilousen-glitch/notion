  function dayOfYear(date) {
    var start = new Date(date.getFullYear(), 0, 0);
    var diff = date - start;
    return Math.floor(diff / 86400000);
  }

  function posClass(pos) {
    var p = pos.toLowerCase();
    if (p.indexOf('n.') === 0 || p.indexOf('/n.') > -1) return 'pos-noun';
    if (p.indexOf('v.') === 0) return 'pos-verb';
    if (p.indexOf('adj.') === 0) return 'pos-adjective';
    if (p.indexOf('adv.') === 0) return 'pos-adverb';
    if (p.indexOf('prep.') === 0) return 'pos-preposition';
    if (p.indexOf('conj.') === 0) return 'pos-conjunction';
    if (p.indexOf('pron.') === 0) return 'pos-pronoun';
    if (p.indexOf('interj.') === 0) return 'pos-interjection';
    return 'pos-other';
  }

  var today = new Date();
  var doy = dayOfYear(today);
  var pick = WORDS[(doy - 1) % WORDS.length];

  document.getElementById('eyebrow').textContent = 'Word of the Day — Day ' + doy + ' of 365';

  var wordEl = document.getElementById('word');
  wordEl.textContent = pick.w;
  wordEl.classList.add(posClass(pick.pos));

  document.getElementById('pos').textContent = pick.pos;
  document.getElementById('pron').textContent = '/' + pick.pron + '/';
  document.getElementById('definition').textContent = pick.def;
  document.getElementById('example').textContent = '“' + pick.ex + '”';

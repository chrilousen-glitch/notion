<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word of the Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #E9EBE1;
    --ink: #2E3A2A;
    --ink-soft: #5B6653;
    --brass: #96703E;
    --brass-line: #C9B99A;
    --card-shadow: rgba(46, 58, 42, 0.08);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    height: 100%;
  }

  body {
    font-family: 'Work Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 480px;
    background: var(--paper);
    border-radius: 6px;
    padding: 32px 34px 28px;
    box-shadow: 0 1px 3px var(--card-shadow), 0 8px 24px var(--card-shadow);
    overflow: hidden;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--brass);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .eyebrow::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--brass-line);
  }

  .word-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
  }

  .word {
    font-family: 'Fraunces', serif;
    font-size: 34px;
    color: var(--ink);
    font-weight: 500;
  }

  .pos {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-soft);
  }

  .pronunciation {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 18px;
    letter-spacing: 0.01em;
  }

  .definition {
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink);
    margin: 0 0 16px;
  }

  .example {
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-soft);
    font-style: italic;
    padding-left: 14px;
    border-left: 2px solid var(--brass-line);
    margin: 0;
  }

  @media (max-width: 420px) {
    .card { padding: 26px 24px 22px; }
    .word { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow" id="eyebrow">Word of the Day</div>
  <div class="word-row">
    <span class="word" id="word"></span>
    <span class="pos" id="pos"></span>
  </div>
  <div class="pronunciation" id="pron"></div>
  <p class="definition" id="definition"></p>
  <p class="example" id="example"></p>
</div>

<script>
  var WORDS = [
    { w: "Diligent", pos: "adj.", pron: "\u02c8dɪl.ɪ.dʒənt", def: "Showing careful, persistent effort in work or duties.", ex: "Her diligent follow-up made the credentialing process go smoothly." },
    { w: "Cadence", pos: "n.", pron: "\u02c8keɪ.dəns", def: "A rhythmic flow or sequence; a regular pattern of steps.", ex: "She kept a steady cadence of applications, one a day, without burning out." },
    { w: "Lucid", pos: "adj.", pron: "\u02c8luː.sɪd", def: "Expressed clearly; easy to understand.", ex: "The evaluator praised his lucid explanation of the reasoning." },
    { w: "Tenacity", pos: "n.", pron: "tə\u02c8næs.ə.ti", def: "Persistence in holding to a course of action despite difficulty.", ex: "Breaking into a new field takes tenacity more than talent." },
    { w: "Deliberate", pos: "adj.", pron: "dɪ\u02c8lɪb.ər.ət", def: "Done consciously and intentionally, not by accident.", ex: "Every section of her portfolio was a deliberate choice." },
    { w: "Rigor", pos: "n.", pron: "\u02c8rɪg.ər", def: "Strict thoroughness and precision.", ex: "Compliance work demands rigor most people never see." },
    { w: "Candor", pos: "n.", pron: "\u02c8kæn.dər", def: "The quality of being open and honest in expression.", ex: "She gave feedback with candor, never softening it into vagueness." },
    { w: "Discern", pos: "v.", pron: "dɪ\u02c8sɜːrn", def: "To recognize or understand a distinction clearly.", ex: "A good evaluator learns to discern nuance from noise." },
    { w: "Momentum", pos: "n.", pron: "moʊ\u02c8men.təm", def: "The force or drive gained by movement or progress.", ex: "One finished application built momentum for the next three." },
    { w: "Prudent", pos: "adj.", pron: "\u02c8pruː.dənt", def: "Acting with care and foresight.", ex: "A prudent budget tracker catches small leaks before they grow." },
    { w: "Cogent", pos: "adj.", pron: "\u02c8koʊ.dʒənt", def: "Clear, logical, and convincing.", ex: "His cogent argument won over the whole committee." },
    { w: "Resilience", pos: "n.", pron: "rɪ\u02c8zɪl.jəns", def: "The capacity to recover quickly from difficulty.", ex: "Resilience, not luck, got her through the career pivot." },
    { w: "Meticulous", pos: "adj.", pron: "mə\u02c8tɪk.jə.ləs", def: "Showing great attention to detail.", ex: "Credentialing work rewards the meticulous and punishes the careless." },
    { w: "Pragmatic", pos: "adj.", pron: "præg\u02c8mæt.ɪk", def: "Dealing with things sensibly and realistically.", ex: "She took a pragmatic approach: apply daily, track everything, adjust weekly." },
    { w: "Vantage", pos: "n.", pron: "\u02c8væn.tɪdʒ", def: "A position that gives a broad view or advantage.", ex: "Her staffing background gave her a rare vantage on healthcare compliance." },
    { w: "Steadfast", pos: "adj.", pron: "\u02c8sted.fæst", def: "Firm and unwavering in purpose or loyalty.", ex: "He stayed steadfast through months of rejections." },
    { w: "Nuance", pos: "n.", pron: "\u02c8nuː.ɑːns", def: "A subtle distinction or shade of meaning.", ex: "Grading model responses is mostly a study in nuance." },
    { w: "Fortitude", pos: "n.", pron: "\u02c8fɔːr.tɪ.tuːd", def: "Courage and strength in facing difficulty.", ex: "It takes fortitude to start over in a new field at any age." },
    { w: "Astute", pos: "adj.", pron: "ə\u02c8stuːt", def: "Having sharp judgment; shrewd.", ex: "An astute reviewer catches the error everyone else skims past." },
    { w: "Coherent", pos: "adj.", pron: "koʊ\u02c8hɪr.ənt", def: "Logical and consistent; forming a unified whole.", ex: "A coherent portfolio tells one story, not five." }
  ];

  function dayOfYear(date) {
    var start = new Date(date.getFullYear(), 0, 0);
    var diff = date - start;
    return Math.floor(diff / 86400000);
  }

  var today = new Date();
  var doy = dayOfYear(today);
  var pick = WORDS[doy % WORDS.length];
  var yearEnd = new Date(today.getFullYear(), 11, 31);
  var totalDays = dayOfYear(yearEnd);

  document.getElementById('eyebrow').textContent = 'Day ' + doy + ' of ' + totalDays;
  document.getElementById('word').textContent = pick.w;
  document.getElementById('pos').textContent = pick.pos;
  document.getElementById('pron').textContent = '/' + pick.pron + '/';
  document.getElementById('definition').textContent = pick.def;
  document.getElementById('example').textContent = '\u201C' + pick.ex + '\u201D';
</script>

</body>
</html>

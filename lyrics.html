<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparent Lyric Matrix</title>

    <style>
        /* Force Courier New globally across the widget with standard monospace fallbacks */
        * {
            font-family: 'Courier New', Courier, monospace !important;
        }

        html, body {
            background-color: transparent; 
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        .lyric-container {
            width: 100%;
            max-width: 600px;
            background-color: transparent; 
            border: 1px solid #000000;    /* Thin black outline */
            border-radius: 6px;            
            box-shadow: none;              
            padding: 24px;                 /* Generous padding so text won't touch the outline */
            box-sizing: border-box;
            text-align: center;            
        }

        .lyric-text {
            font-size: 1.8em;              
            font-weight: 400;              
            line-height: 1.35;
            margin-bottom: 16px;
            text-transform: none !important; /* Hard reset to stop any capitalization overrides */
            transition: color 0.5s ease;
        }

        .song-title {
            font-size: 1.1em;              
            font-weight: 700;              /* Distinct bold weight for contrast */
            letter-spacing: 2px;           /* Clean spacing for monospaced tracking */
            text-transform: uppercase !important; /* Enforces all caps for the artist */
            transition: color 0.5s ease;
        }
    </style>
</head>
<body>

<div class="lyric-container" id="widgetContainer">
    <div class="lyric-text" id="lyricDisplay">Loading inspiration...</div>
    <div class="song-title" id="songDisplay">Loading...</div>
</div>

        "#0a714e", // Forest Green

        "#004e7a", // Navy Blue

        "#0097b2"  // Cyan/Teal

        { text: "I'm gonna sit on the porch and watch the storm roll in. Let the thunder roll, let the rain wash over my skin.", artist: "The Band of Heathens" },
        { text: "Don't let the sound of your own wheels drive you crazy.", artist: "Eagles" },
        { text: "To live is to fly, low and high. So close your eyes and let the darkness rotate by.", artist: "Townes Van Zandt" },
        { text: "We're the new face of 'failure'—pretty and clean. Statuesque in the black light, living a dream.", artist: "Fall Out Boy" },
        { text: "We are young despite the years.", artist: "fun." },
        { text: "The sun is the same in a relative way, but you're older.", artist: "Pink Floyd" },
        { text: "Don't focus on the future or you'll miss what's right in front of you.", artist: "Phish" },
        { text: "Emancipate yourselves from mental slavery.", artist: "Bob Marley" },
        { text: "There is a crack in everything, that's how the light gets in.", artist: "Leonard Cohen" },

        { text: "The days are long but the years are short.", artist: "Nickel Creek" },
        { text: "I have thousands of days left to wander.", artist: "Hey Rosetta!" },  
        { text: "None but ourselves can free our minds.", artist: "Bob Marley" },
        { text: "May your heart always be joyful, may your song always be sung.", artist: "Bob Dylan" },
        { text: "I change shapes just to hide in this place, but I'm still an animal.", artist: "Miike Snow" },

        { text: "I'm just a man on a wire, a contradiction in arms. Trading pieces of soul to keep from causing you harm.", artist: "Fall Out Boy" }

    // Pick a color that is guaranteed different from the last one stored
    function getUniqueRandomColor() {
        const lastColor = localStorage.getItem('widgetLastColor');
        const availableColors = allowedColors.filter(c => c !== lastColor);
        const nextColor = availableColors[Math.floor(Math.random() * availableColors.length)];
        
        localStorage.setItem('widgetLastColor', nextColor);
        return nextColor;
    }

    // Main update trigger for changing both layout color and typography content
    function updateWidgetState() {
        if (allLyrics.length === 0) return;

        // 1. Swap the lyric and artist info randomly
        const randomIndex = Math.floor(Math.random() * allLyrics.length);
        const selected = allLyrics[randomIndex];

        const lyricEl = document.getElementById('lyricDisplay');
        const songEl = document.getElementById('songDisplay');

        lyricEl.textContent = selected.text;
        songEl.textContent = "- " + selected.artist + " -";
        
        // 2. Grab a fresh color and transition the font styling
        const activeColor = getUniqueRandomColor();
        lyricEl.style.color = activeColor;
        songEl.style.color = activeColor;
    }

    // Calculate time remaining directly until the next exact :00 or :30 mark
    function msUntilNextInterval() {
        const now = new Date();
        const min = now.getMinutes();
        const sec = now.getSeconds();
        const ms = now.getMilliseconds();
        
        const minutesRemaining = (min < 30) ? (30 - min) : (60 - min);
        return (minutesRemaining * 60 * 1000) - (sec * 1000) - ms;
    }

    // Handle timer hand-off for strict half-hourly updates
    function initializeSyncTimer() {
        setTimeout(() => {
            updateWidgetState(); // Trigger on the exact half-hour split
            setInterval(updateWidgetState, 1800000); // Repeat every 30 minutes thereafter
        }, msUntilNextInterval());
    }

    // --- EXECUTE ON LOAD ---
    updateWidgetState();   // Fires instantly on layout refresh
    initializeSyncTimer(); // Syncs background cycles to system clock
</script>

</body>
</html>

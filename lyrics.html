<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparent Lyric Matrix</title>

    <style>
        /* Force Times New Roman globally across the widget with standard fallback */
        * {
            font-family: 'Times New Roman', Times, serif !important;
        }

        html, body {
            background-color: transparent; 
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        .lyric-container {
            width: 100%;
            max-width: 600px;
            background-color: transparent; 
            border: 1px solid #000000;    /* Thin black outline */
            border-radius: 6px;            
            box-shadow: none;              
            padding: 24px;                 /* Generous padding so text won't touch the outline */
            box-sizing: border-box;
            text-align: center;            
        }

        .lyric-text {
            font-size: 2em;              
            font-weight: 400;              
            line-height: 1.25;
            margin-bottom: 12px;
            text-transform: none !important; /* Hard reset to stop any capitalization overrides */
            transition: color 0.5s ease;
        }

        .song-title {
            font-size: 1.3em;              
            font-weight: 700;              /* Distinct bold weight for contrast */
            letter-spacing: 3px;           /* Elegantly widened tracking */
            text-transform: uppercase !important; /* Enforces all caps for the artist */
            transition: color 0.5s ease;
        }
    </style>
</head>
<body>

<div class="lyric-container" id="widgetContainer">
    <div class="lyric-text" id="lyricDisplay">Loading inspiration...</div>
    <div class="song-title" id="songDisplay">Loading...</div>
</div>

    function getColorForTime(currentTime) {
        if (currentTime >= 0.0 && currentTime < 3.01) {
            return "#0cc0df"; // 12:00 AM - 3:00 AM
        } else if (currentTime >= 3.01 && currentTime < 5.01) {
            return "#ff914d"; // 3:01 AM - 5:00 AM
        } else if (currentTime >= 5.01 && currentTime < 11.01) {
            return "#ff5757"; // 5:01 AM - 11:00 AM
        } else if (currentTime >= 11.01 && currentTime < 14.01) {
            return "#cc007e"; // 11:01 AM - 2:00 PM
        } else if (currentTime >= 14.01 && currentTime < 16.01) {
            return "#0a714e"; // 2:01 PM - 4:00 PM
        } else if (currentTime >= 16.01 && currentTime < 18.01) {
            return "#457a00"; // 4:01 PM - 6:00 PM
        } else if (currentTime >= 18.01 && currentTime < 20.01) {
            return "#004e7a"; // 6:01 PM - 8:00 PM
        } else if (currentTime >= 20.01 && currentTime < 21.01) {
            return "#561269"; // 8:01 PM - 9:00 PM
        } else if (currentTime >= 21.01 && currentTime < 23.01) {
            return "#7a0000"; // 9:01 PM - 11:00 PM
        } else {
            return "#0097b2"; // 11:01 PM - 11:59 PM
        }
    }

    function updateWidget() {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes();
        const currentTime = hours + (minutes / 60); 
        
        let currentPool = [];

        if (currentTime >= 2.0 && currentTime < 9.0) {
            currentPool = lyricPools.morning;
        } else if (currentTime >= 9.0 && currentTime < 14.0) {
            currentPool = lyricPools.workHours;
        } else if (currentTime >= 14.0 && currentTime < 20.0) {
            currentPool = lyricPools.afternoon;
        } else {
            currentPool = lyricPools.evening;
        }

        if (currentPool && currentPool.length > 0) {
            const randomIndex = Math.floor(Math.random() * currentPool.length);
            const selected = currentPool[randomIndex];

            const lyricEl = document.getElementById('lyricDisplay');
            const songEl = document.getElementById('songDisplay');

            lyricEl.textContent = selected.text;
            songEl.textContent = "- " + selected.artist + " -";
            
            const activeColor = getColorForTime(currentTime);
            lyricEl.style.color = activeColor;
            songEl.style.color = activeColor;
        }
    }

    updateWidget();
    setInterval(updateWidget, 1800000); 
</script>

</body>
</html>

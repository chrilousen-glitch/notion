    <style>
        /* Force Amatic SC everywhere globally, overriding any container defaults */
        * {
            font-family: 'Amatic SC', sans-serif !important;
        }

        html, body {
            background-color: transparent; 
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        .lyric-container {
            width: 100%;
            max-width: 500px;
            background-color: transparent; 
            border: 1px solid #000000;    /* Thin black outline */
            border-radius: 6px;            
            box-shadow: none;              
            padding: 24px;                 /* Generous padding so text won't touch the outline */
            box-sizing: border-box;
            text-align: center;            
        }

        .lyric-text {
            font-size: 2.6em;              /* Increased size for better hierarchy */
            font-weight: 400;              /* Regular weight for the lyric itself */
            line-height: 1.2;
            margin-bottom: 12px;
            text-transform: uppercase;     /* Consistent presentation style */
            transition: color 0.5s ease;
        }

        .song-title {
            font-size: 1.3em;              /* Adjusted for balanced contrast against the regular text */
            font-weight: 700;              /* Clean, explicit bold weight for the artist name */
            letter-spacing: 3px;           /* Slightly widened tracking for readability */
            text-transform: uppercase;
            transition: color 0.5s ease;
        }
    </style>
</head>

    function updateWidget() {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes();
        const currentTime = hours + (minutes / 60); 
        
        let currentPool = [];

        if (currentTime >= 2.0 && currentTime < 9.0) {
            currentPool = lyricPools.morning;
        } else if (currentTime >= 9.0 && currentTime < 14.0) {
            currentPool = lyricPools.workHours;
        } else if (currentTime >= 14.0 && currentTime < 20.0) {
            currentPool = lyricPools.afternoon;
        } else {
            currentPool = lyricPools.evening;
        }

        if (currentPool && currentPool.length > 0) {
            const randomIndex = Math.floor(Math.random() * currentPool.length);
            const selected = currentPool[randomIndex];

            const lyricEl = document.getElementById('lyricDisplay');
            const songEl = document.getElementById('songDisplay');

            lyricEl.textContent = selected.text;
            songEl.textContent = "- " + selected.artist + " -";
            
            lyricEl.style.color = selected.textColor;
            songEl.style.color = selected.textColor;
        }
    }

    updateWidget();

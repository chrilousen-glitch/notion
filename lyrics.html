<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparent Lyric Matrix</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Cinzel:wght@600&family=Special+Elite&family=Sedgwick+Ave&family=Bungee&family=Space+Mono:wght@700&family=Fredericka+the+Great&family=VT323&display=swap" rel="stylesheet">

    <style>
        html, body {
            background-color: transparent; /* Seamless light/dark mode adaptation */
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        .lyric-container {
            width: 100%;
            max-width: 500px;
            background-color: transparent; /* No background box */
            border: none;                  /* No borders */
            box-shadow: none;              /* No shadows */
            padding: 10px;
            box-sizing: border-box;
            text-align: center;            /* Perfectly centered layout */
            transition: font-family 0.5s ease; 
        }

        .lyric-text {
            font-size: 1.45em;
            line-height: 1.6;
            margin-bottom: 12px;
            transition: color 0.5s ease;
        }

        .song-title {
            font-size: 1.1em;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.5s ease;
        }
    </style>
</head>
<body>

<div class="lyric-container" id="widgetContainer">
    <div class="lyric-text" id="lyricDisplay">Loading inspiration...</div>
    <div class="song-title" id="songDisplay">Loading...</div>
</div>

<script>
    // == YOUR TRANSPARENT LYRIC MATRIX ==
    const lyricPools = {
        morning: [
            { 
                text: "KEEP YOUR EYES ON THE PRIZE, KEEP YOUR FEET ON THE GROUND. DON'T LET THE WEIGHT OF THE WORLD TRY TO DRAG YOU DOWN.", 
                artist: "THE BAND OF HEATHENS",
                font: "'Special Elite', serif", 
                textColor: "#a1887f" // Muted brown/gray that works in light & dark
            },
            { 
                text: "BLUE SKY TO BLUE SKY, NEW DAY TO NEW DAY... YOU FIND YOUR WAY.", 
                artist: "THE ALLMAN BROTHERS BAND",
                font: "sans-serif",
                textColor: "#2196f3" // Vibrant blue
            },
            { 
                text: "SO I'LL SET MY DIAL TO THE CENTER OF TOWN, AND I'LL TURN IT UP UNTIL THE SPEAKERS BLOW DOWN.", 
                artist: "DAWES",
                font: "'Space Mono', monospace",
                textColor: "#ff7043" // Energetic coral morning pop
            }
        ],
        workHours: [
            { 
                text: "OH, SILLY ME. THAT'S JUST ME.", 
                artist: "KURT VILE",
                font: "'Architects Daughter', cursive", 
                textColor: "#1800ad" // Deep blue
            },
            { 
                text: "Wakin', the dawn of day, And I gotta think about what I wanna say...", 
                artist: "KURT VILE",
                font: "'Space Mono', monospace", 
                textColor: "#666666" // Neutral gray
            },
            {
                text: "Honey, I'm a prize and you're a catch. We're a perfect match.",
                artist: "NICKEL CREEK",
                font: "'Special Elite', serif",
                textColor: "#7e57c2" // Mid-day deep lavender
            }
        ],
        afternoon: [
            { 
                text: "JUST RELAX. YOU'RE DOING FINE.", 
                artist: "PHISH",
                font: "'Sedgwick Ave', cursive", 
                textColor: "#4db6ac" // Sage/teal tone
            },
            { 
                text: "You can't always get what you want, but if you try sometimes, you just might find you get what you need.", 
                artist: "The Rolling Stones",
                font: "Georgia, serif",
                textColor: "#e57373" // Soft brick red
            },
            {
                text: "She wants to do right, just not right now.",
                artist: "The Band of Heathens",
                font: "'VT323', monospace",
                textColor: "#26a69a" // Focus-enhancing mint/teal
            }
        ],
        evening: [
            { 
                text: "I'M GONNA SIT ON THE PORCH AND WATCH THE STORM ROLL IN. LET THE THUNDER ROLL, LET THE RAIN WASH OVER MY SKIN.", 
                artist: "THE BAND OF HEATHENS",
                font: "'Bungee', sans-serif", 
                textColor: "#ffb74d" // Golden orange for nighttime pop
            },
            { 
                text: "DON'T LET THE SOUND OF YOUR OWN WHEELS DRIVE YOU CRAZY.", 
                artist: "EAGLES",
                font: "'Times New Roman', serif",
                textColor: "#90a4ae" // Slate gray
            },
            {
                text: "TO LIVE IS TO FLY, LOW AND HIGH. SO CLOSE YOUR EYES AND LET THE DARKNESS ROTATE BY.",
                artist: "TOWNES VAN ZANDT",
                font: "'Cinzel', serif",
                textColor: "#b0bec5" // Ethereal starlight silver
            },
            {
                text: "WE'RE THE NEW FACE OF 'FAILURE'—PRETTY AND CLEAN. STATUESQUE IN THE BLACK LIGHT, LIVING A DREAM.",
                artist: "FALL OUT BOY",
                font: "'Bungee', sans-serif",
                textColor: "#f48fb1" // Vibrant neon pink pop
            }
        ]
    };

    function updateWidget() {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes();
        const currentTime = hours + (minutes / 60); // Corrected time math mapping
        
        let currentPool = [];

        // Check time slots
        if (currentTime >= 2.01 && currentTime < 9.00) {
            currentPool = lyricPools.morning;
        } else if (currentTime >= 9.00 && currentTime <= 14.00) {
            currentPool = lyricPools.workHours;
        } else if (currentTime > 14.00 && currentTime <= 20.00) {
            currentPool = lyricPools.afternoon;
        } else {
            currentPool = lyricPools.evening;
        }

        // Randomly pick a quote
        const randomIndex = Math.floor(Math.random() * currentPool.length);
        const selected = currentPool[randomIndex];

        const container = document.getElementById('widgetContainer');
        const lyricEl = document.getElementById('lyricDisplay');
        const songEl = document.getElementById('songDisplay');

        // Apply text content
        lyricEl.textContent = selected.text;
        songEl.textContent = "- " + selected.artist + " -";
        
        // Dynamically apply styles
        container.style.fontFamily = selected.font;
        lyricEl.style.color = selected.textColor;
        songEl.style.color = selected.textColor;
    }

    updateWidget();
    setInterval(updateWidget, 1800000); // Rotate every 30 minutes
</script>

</body>
</html>

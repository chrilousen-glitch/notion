<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparent Lyric Matrix</title>

    <style>
        /* Force Times New Roman globally across the widget */
        * {
            font-family: 'Times New Roman', Times, serif !important;
        }

        html, body {
            background-color: transparent; 
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        .lyric-container {
            width: 100%;
            max-width: 600px;
            background-color: transparent; 
            border: 1px solid #000000;    /* Thin black outline */
            border-radius: 6px;            
            box-shadow: none;              
            padding: 24px;                 /* Generous padding so text won't touch the outline */
            box-sizing: border-box;
            text-align: center;            
        }

        .lyric-text {
            font-size: 2em;              
            font-weight: 400;              
            line-height: 1.25;
            margin-bottom: 12px;
            /* text-transform removed here to allow original sentence capitalization */
            transition: color 0.5s ease;
        }

        .song-title {
            font-size: 1.3em;              
            font-weight: 700;              /* Distinct bold weight for contrast */
            letter-spacing: 3px;           /* Elegantly widened tracking */
            text-transform: uppercase;     /* Enforces all caps for the artist */
            transition: color 0.5s ease;
        }
    </style>
</head>
<body>

<div class="lyric-container" id="widgetContainer">
    <div class="lyric-text" id="lyricDisplay">Loading inspiration...</div>
    <div class="song-title" id="songDisplay">Loading...</div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greetings</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { text-transform: none; background: transparent; margin: 0; padding: 8px; }
        
        /* Forces Montserrat across the whole widget */
        .widget, .greet, .date, .clock { 
            font-family: 'Montserrat', sans-serif !important; 
        }
        
        .widget { padding: 8px; color: #000000; display: flex; justify-content: center; align-items: center; flex-direction: column; max-width: 100%; margin: auto; border: 2px solid #000000; border-radius: 5px; background: transparent; }
        
        /* Font sizes using your exact pt (point) requests */
        .greet { font-size: 14pt; font-weight: 400; margin-bottom: 4px; }
        .date { font-size: 12pt; font-weight: 400; margin-bottom: 4px; letter-spacing: 0.5px; }
        .clock { font-size: 11pt; font-weight: 400; letter-spacing: 1px; }
        
        /* Ensures the moving clock numbers don't jitter or bounce around */
        .time { display: inline-block; min-width: 24px; text-align: center; }
        .colon { font-size: 1em; display: inline-block; padding: 0 1px; }
    </style>
    <style id="dynamicColorStyles"></style>
</head>
<body>
<div class="container">
    <div class="widget">
        <div class="greet" id="greet"></div>
        <div class="date" id="date"></div>
        <div class="clock">
            <div class="time" id="hour"></div>
            <div class="colon">:</div>
            <div class="time" id="min"></div>
            <div class="colon">:</div>
            <div class="time" id="sec"></div>
        </div>
    </div>
</div>        
<script>
    // == YOUR 10 SPECIFIED COLOR HEX CODES ==
    const allowedColors = [
        "#0cc0df", // Bright Blue
        "#ff914d", // Orange
        "#ff5757", // Red
        "#cc007e", // Deep Magenta
        "#0a714e", // Forest Green
        "#457a00", // Olive Green
        "#004e7a", // Navy Blue
        "#561269", // Deep Purple
        "#7a0000", // Maroon
        "#0097b2"  // Cyan/Teal
    ];

    // Pick a color that is guaranteed different from the last one stored
    function getUniqueRandomColor() {
        const lastColor = localStorage.getItem('greetingsLastColor');
        const availableColors = allowedColors.filter(c => c !== lastColor);
        const nextColor = availableColors[Math.floor(Math.random() * availableColors.length)];
        
        localStorage.setItem('greetingsLastColor', nextColor);
        return nextColor;
    }

    // Overrides text colors securely via CSS rules instead of touching HTML inner content
    function applyDynamicColoring() {
        const activeColor = getUniqueRandomColor();
        const styleSheet = document.getElementById('dynamicColorStyles');
        
        // Force the text elements inside the widget to inherit the color override
        styleSheet.innerHTML = `.widget, .greet, .date, .clock, .time, .colon { color: ${activeColor} !important; }`;
    }

    // Calculate time remaining directly until the next exact :00 or :30 mark on the clock
    function msUntilNextInterval() {
        const now = new Date();
        const min = now.getMinutes();
        const sec = now.getSeconds();
        const ms = now.getMilliseconds();
        
        const minutesRemaining = (min < 30) ? (30 - min) : (60 - min);
        return (minutesRemaining * 60 * 1000) - (sec * 1000) - ms;
    }

    // Coordinates the interval color cycles
    function initializeSyncTimer() {
        setTimeout(() => {
            applyDynamicColoring(); // Changes right at the upcoming top/half hour
            setInterval(applyDynamicColoring, 1800000); // Continues cycling every 30 minutes
        }, msUntilNextInterval());
    }

    // --- WIDGET ENGINE ---
    function displayGreetings(today){
        var hrs = today.getHours();
        var name = "Christi";
        var greet = "";
        if (hrs < 12) greet = 'Good Morning, ' + name + "!";
        else if (hrs >= 12 && hrs <= 17) greet = 'Good Afternoon, ' + name + "!";
        else greet = 'Good Evening, ' + name + "!";
        document.getElementById('greet').innerHTML = greet;
    }
    function displayDate(today) {   
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        // Formats exactly as: Day of the Week, Month Day, Year
        document.getElementById('date').innerHTML = days[today.getDay()] + ", " + monthNames[today.getMonth()] + " " + today.getDate() + ", " + today.getFullYear();
    }
    function displayClock(today) {
        var hour = padZeros(twelveHour(today.getHours()));
        var minutes = padZeros(today.getMinutes());
        var seconds = padZeros(today.getSeconds()) + (today.getHours() >= 12 ? " pm" : " am");
        document.getElementById('hour').innerHTML = hour;
        document.getElementById('min').innerHTML = minutes;
        document.getElementById('sec').innerHTML = seconds;
    }
    function twelveHour(hour) { return hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour); }
    function padZeros(num) { return num < 10 ? '0' + num : num; }
    
    function displayWidget() {
        var today = new Date();
        displayGreetings(today); displayDate(today); displayClock(today);
        setTimeout(displayWidget, 500);
    }
    
    // --- RUN EVERYTHING ---
    applyDynamicColoring(); // Sets random color instantly on page load/refresh
    displayWidget();        // Starts your original live display clock loops
    initializeSyncTimer();  // Sets up the hourly/half-hourly color changes
</script>
</body>
</html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { text-transform: none; background: transparent; margin: 0; padding: 10px; }
        .widget { padding: 15px; color: #000000; display: flex; justify-content: center; align-items: center; flex-direction: column; max-width: 75%; margin: auto; border: 2px solid #000000; border-radius: 5px; background: transparent; }
        .greet { font-size: 2em; }
        .date { font-family: monospace; font-size: 1.75em; }
        .clock { font-family: monospace; font-size: 1.25em; }
        .time { display: inline-block; min-width: 15px; }
        .colon { font-size: 1em; display: inline-block; }
    </style>
    <style id="dynamicColorStyles"></style>
</head>
<body>
<div class="container">
    <div class="widget">
        <div class="greet" id="greet"></div>
        <div class="date" id="date"></div>
        <div class="clock">
            <div class="time" id="hour"></div>
            <div class="colon">:</div>
            <div class="time" id="min"></div>
            <div class="colon">:</div>
            <div class="time" id="sec"></div>
        </div>
    </div>
</div>        
<script>
    // == YOUR 10 SPECIFIED COLOR HEX CODES ==
    const allowedColors = [
        "#0cc0df", // Bright Blue
        "#ff914d", // Orange
        "#ff5757", // Red
        "#cc007e", // Deep Magenta
        "#0a714e", // Forest Green
        "#457a00", // Olive Green
        "#004e7a", // Navy Blue
        "#561269", // Deep Purple
        "#7a0000", // Maroon
        "#0097b2"  // Cyan/Teal
    ];

    // Pick a color that is guaranteed different from the last one stored
    function getUniqueRandomColor() {
        const lastColor = localStorage.getItem('greetingsLastColor');
        const availableColors = allowedColors.filter(c => c !== lastColor);
        const nextColor = availableColors[Math.floor(Math.random() * availableColors.length)];
        
        localStorage.setItem('greetingsLastColor', nextColor);
        return nextColor;
    }

    // Overrides text colors securely via CSS rules instead of touching HTML inner content
    function applyDynamicColoring() {
        const activeColor = getUniqueRandomColor();
        const styleSheet = document.getElementById('dynamicColorStyles');
        
        // Force the text elements inside the widget to inherit the color override
        styleSheet.innerHTML = `.widget, .greet, .date, .clock, .time, .colon { color: ${activeColor} !important; }`;
    }

    // Calculate time remaining directly until the next exact :00 or :30 mark on the clock
    function msUntilNextInterval() {
        const now = new Date();
        const min = now.getMinutes();
        const sec = now.getSeconds();
        const ms = now.getMilliseconds();
        
        const minutesRemaining = (min < 30) ? (30 - min) : (60 - min);
        return (minutesRemaining * 60 * 1000) - (sec * 1000) - ms;
    }

    // Coordinates the interval color cycles
    function initializeSyncTimer() {
        setTimeout(() => {
            applyDynamicColoring(); // Changes right at the upcoming top/half hour
            setInterval(applyDynamicColoring, 1800000); // Continues cycling every 30 minutes
        }, msUntilNextInterval());
    }

        document.getElementById('greet').innerHTML = greet;
    }
